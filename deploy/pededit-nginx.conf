server {
    listen 80;
    server_name your-domain.example.com;

    # Django admin static files
    location /djstatic/ {
        alias /opt/pededit/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API and admin — proxy to Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA — serve Vite build, fall back to index.html for client-side routing
    location / {
        root /opt/pededit/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Vite hashed assets get long cache
        location ~* \.(js|css|woff2?|svg|png|jpg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
