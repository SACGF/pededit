<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Father (square, unaffected) -->
  <rect x="2" y="4" width="12" height="12" fill="white" stroke="black" stroke-width="1.8"/>
  <!-- Mother (circle, unaffected) -->
  <circle cx="40" cy="10" r="6" fill="white" stroke="black" stroke-width="1.8"/>
  <!-- Couple line -->
  <line x1="14" y1="10" x2="34" y2="10" stroke="black" stroke-width="1.8"/>
  <!-- Drop line to proband -->
  <line x1="24" y1="10" x2="24" y2="29" stroke="black" stroke-width="1.8"/>
  <!-- Proband (filled circle = affected) -->
  <circle cx="24" cy="38" r="7" fill="black"/>
  <!-- Proband arrow -->
  <line x1="44" y1="47" x2="31" y2="43" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="31,43 35,47 37,41" fill="black"/>
</svg>
